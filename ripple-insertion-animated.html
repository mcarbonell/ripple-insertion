<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TSP - Depuración KD-Tree y Ripple Insertion</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      canvas {
        border: 1px solid black;
        cursor: crosshair;
        margin-top: 10px;
      }

      .controls {
        margin: 10px;
        padding: 15px;
        background: #f0f0f0;
        border-radius: 8px;
        text-align: left;
      }

      button {
        padding: 8px 16px;
        font-size: 14px;
        cursor: pointer;
        margin-right: 5px;
      }

      .stats {
        margin-top: 10px;
        font-family: monospace;
        font-size: 16px;
        background: #333;
        color: #fff;
        padding: 5px 10px;
        border-radius: 4px;
      }

      .legend {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
      }

      label {
        margin-right: 10px;
        display: inline-block;
        margin-bottom: 5px;
      }

      .mode-group {
        margin-bottom: 10px;
        border-bottom: 1px solid #ccc;
        padding-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <h1>TSP - Ripple Insertion v0.1.1</h1>

    <div class="controls">
      <div class="mode-group">
        <strong>Modo:</strong>
        <label
          ><input type="radio" name="mode" value="insert" checked /> Insertar &
          Optimizar</label
        >
        <label
          ><input type="radio" name="mode" value="inspect" /> Inspeccionar
          Vecinos (KD-Tree)</label
        >
      </div>

      <div class="mode-group">
        <strong>TSPLIB:</strong>
        <select id="tsplibSelect">
          <option value="">-- Seleccionar instancia --</option>
          <option value="eil51.json">eil51 (n=51, opt=426)</option>
          <option value="berlin52.json">berlin52 (n=52, opt=7542)</option>
          <option value="st70.json">st70 (n=70, opt=675)</option>
          <option value="kroA100.json">kroA100 (n=100, opt=21282)</option>
          <option value="ch130.json">ch130 (n=130, opt=6110)</option>
          <option value="ch150.json">ch150 (n=150, opt=6528)</option>
        </select>
        <button onclick="loadTSPLIB()">Cargar TSPLIB</button>
      </div>

      <button onclick="generateRandom(30)">Generar 30 Aleatorios</button>
      <button onclick="clearCanvas()">Limpiar</button>
      <br />
      <label
        >Vecinos (M):
        <input type="number" id="kNeighbors" value="10" min="3" max="100"
      /></label>
      <label
        >Velocidad (ms):
        <input type="number" id="delay" value="100" min="0" max="1000"
      /></label>
      <label>Auto-Play: <input type="checkbox" id="autoplay" checked /></label>
    </div>

    <canvas id="tspCanvas" width="800" height="500"></canvas>
    <div class="stats" id="stats">Nodos: 0 | Costo: 0.00 | Estado: Listo</div>
    <div class="stats" id="comparisonStats" style="background: #2c5aa0"></div>
    <div class="legend">
      🔴 Nodo Estático | 🟢 Último Insertado | 🟡 En Cola (ActiveSet) | 🔵
      Líneas de Inspección
    </div>

    <script type="module" src="./demo/optimized.js"></script>
  </body>
</html>
